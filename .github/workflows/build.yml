name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Debug Keystore & Mock Google Services
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        
        cat << 'JSON' > app/google-services.json
        {
          "project_info": {
            "project_number": "123456789012",
            "project_id": "giro-certo-app"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:123456789012:android:1234567890123456",
                "android_client_info": {
                  "package_name": "com.incendiariosbr.girocerto.rkqnz"
                }
              }
            }
          ]
        }
        JSON

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK with Gradle
      run: gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GiroCerto-APK
        path: app/build/outputs/apk/debug/app-debug.apk
